<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div>
      <h1>Hi</h1>
      <textarea>message</textarea>
      <button onclick="window.click()">Click to send</button>
    </div>
    <form action="/post" method="post" enctype="multipart/form-data">
      <input type="text" name="field1" />
      <input type="text" name="field2" />
      <input type="text" name="field3" />
      <input type="text" name="field4" />
      <input type="text" name="field5" />
      <input type="text" name="field6" />
      <input type="text" name="field7" />
      <input type="text" name="field8" />
      <input type="text" name="field9" />
      <input type="text" name="field10" />
      <input type="file" name="file1" />
      <input type="file" name="file2" />
      <input type="file" name="file3" />
      <input type="file" name="file4" />
      <input type="file" name="file5" />
      <input type="file" name="file6" />
      <input type="file" name="file7" />
      <input type="file" name="file8" />
      <input type="file" name="file9" />
      <input type="file" name="file10" />
      <input type="file" name="file11" />
      <input type="file" name="file12" />
      <input type="file" name="file13" />
      <input type="file" name="file14" />
      <input type="file" name="file15" />
      <input type="file" name="file16" />
      <input type="file" name="file17" />
      <input type="file" name="file18" />
      <input type="file" name="file19" />
      <button type="submit">Submit</button>
    </form>
    <script type="module">
      import { Test } from "/compiled";
      (async function () {
        console.log(Test);
        const textarea = document.querySelector("textarea");
        window.click = async function () {
          /**
           * @type {Uint8Array}
           */
          window.message = Test.encode(
            Test.create({ hello: textarea.value })
          ).finish();
          var body = window.message.slice(0, window.message.byteLength).buffer;
          var response = fetch("/api", {
            method: "POST",
            body,
            headers: new Headers({
              "Content-Type": "application/x-protobuf",
            }),
          }).then((res) => res.arrayBuffer());
          console.log(Test.decode(new Uint8Array(await response)));
        };
      })();
    </script>
  </body>
</html>
